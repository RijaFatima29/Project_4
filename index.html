S<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1 class="logo">PinkBloom Shop 🌸</h1>

    <input type="text" id="searchBox" class="search" placeholder="Search products...">

    <div class="cart-icon">
      🛒 <span id="cartCount">0</span>
    </div>
  </header>

  <!-- Main Content -->
<div class="store-box">
  <div class="container">


    <div id="productList" class="product-grid"></div>

    <div class="cart-box">
      <h3>Your Cart</h3>
      <ul id="cartItems"></ul>
      <p><strong>Total: Rs <span id="cartTotal">0</span></strong></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
